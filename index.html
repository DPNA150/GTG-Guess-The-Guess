<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTG</title>
    <link id="css" rel="stylesheet" href="style.css">
</head>

<body>
    <ul class="mensagem">
        <p>
            SELECIONE O DISPOSITIVO QUE VOCÊ ESTÁ ULTILIZANDO PARA MELHORAR A SUA EXPERIÊNCIA DE USUÁRIO.
        </p>
        <input class="botao" type="button" value="CELULAR" onclick="dispositivoSelecionado('CELULAR')">
        <input class="botao" type="button" value="PC/NOTBOOK" onclick="dispositivoSelecionado('PC/NOTBOOK')"><br><br>
    </ul>

    <ul id="mainMB" style="display: none;">
        <h1>Selecione o tema para começar</h1><br>
        <ul class="Generos">
            <a href="filmesInicio-MB.html">
                <img src="filmes.png" width="100%">
            </a>
            <a href="esportes-MB.html">
                <img src="esportes.png" width="100%">
            </a>
            <a href="animaçãoInicio-MB.html">
                <img src="animações.png" width="100%">
            </a>
        </ul>
        <ul>
            <h1><img src="logoDPNA.png" width="10%" alt="logo"></h1>
            <p class="copyright">© Copyright DPNA CRIAS</p><br>
        </ul>
    </ul>

    <ul id="mainPC" style="display: none;">
        <h1>Selecione o tema para começar</h1><br>
        <ul class="Generos">
            <a href="filmesInicio-PC.html">
                <img src="filmes.png" width="100%">
            </a>
            <a href="esportes-PC.html">
                <img src="esportes.png" width="100%">
            </a>
            <a href="animaçãoInicio-PC.html">
                <img src="animações.png" width="100%">
            </a>
        </ul>
        <ul>
            <h1><img src="logoDPNA.png" width="10%" alt="logo"></h1>
            <p class="copyright">© Copyright DPNA CRIAS</p><br>
        </ul>
    </ul>

    <script>
        function dispositivoSelecionado(dispositivo) {
            var mainMB = document.getElementById("mainMB");
            var mainPC = document.getElementById("mainPC");
            var mensagem = document.querySelector(".mensagem");
            var css = document.getElementById("css");

            if (dispositivo === 'CELULAR') {
                mainMB.style.display = "block";
                mensagem.style.display = "none";
                css.setAttribute("href", "style-MB.css");
            } else if (dispositivo === 'PC/NOTBOOK') {
                mainPC.style.display = "block";
                mensagem.style.display = "none";
                css.setAttribute("href", "style-PC.css");
            }
        }
    </script>

</body>

</html>
